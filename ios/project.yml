name: PiRemote
packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.7.0"
  sentry-cocoa:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
options:
  bundleIdPrefix: dev.chenda
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    ENABLE_USER_SCRIPT_SANDBOXING: true
    SENTRY_DSN: ""
targets:
  PiRemote:
    type: application
    platform: iOS
    sources:
      - path: PiRemote
        type: group
        excludes:
          - "Resources/AppIcon.icon"
      - path: PiRemote/Resources/AppIcon.icon
        type: folder
        buildPhase: resources
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.PiRemote
        PRODUCT_NAME: PiRemote
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: AZAQMY4SPZ
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        ENABLE_USER_SCRIPT_SANDBOXING: false
    entitlements:
      path: PiRemote/Resources/PiRemote.entitlements
    info:
      path: PiRemote/Resources/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
        NSSupportsLiveActivities: true
        NSCameraUsageDescription: "Pi Remote uses the camera to take photos for agent conversations."
        NSPhotoLibraryUsageDescription: "Pi Remote accesses your photo library to attach images to agent conversations."
        NSLocalNetworkUsageDescription: "Pi Remote needs local network access to connect to your Mac server."
        NSMicrophoneUsageDescription: "Pi Remote uses the microphone for voice dictation in the chat composer."
        NSFaceIDUsageDescription: "Pi Remote uses Face ID to confirm approval of high-risk agent actions like sudo, force push, and recursive deletes."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        SentryDSN: "$(SENTRY_DSN)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    preBuildScripts:
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml" --quiet
          else
            echo "warning: SwiftLint not installed — brew install swiftlint"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/bash
        showEnvVars: false
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: sentry-cocoa
        product: Sentry
      - target: PiRemoteActivityExtension
        embed: true

  OppiMac:
    type: application
    platform: macOS
    sources:
      - path: OppiMac
        type: group
      - path: PiRemote/Core/Extensions/Date+Relative.swift
        group: PiRemote/Core/Extensions
      - path: PiRemote/Core/Security/ConnectionSecurityPolicy.swift
        group: PiRemote/Core/Security
      - path: PiRemote/Core/Models/ExtensionInfo.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/JSONValue.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/ClientMessage.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/Permission.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/ServerMessage.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/Session.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/SkillDetail.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/SkillInfo.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/TraceEvent.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/User.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Models/Workspace.swift
        group: PiRemote/Core/Models
      - path: PiRemote/Core/Networking/APIClient.swift
        group: PiRemote/Core/Networking
      - path: PiRemote/Core/Networking/WebSocketClient.swift
        group: PiRemote/Core/Networking
      - path: PiRemote/Core/Services/ClientLogBuffer.swift
        group: PiRemote/Core/Services
      - path: PiRemote/Core/Services/SentryService.swift
        group: PiRemote/Core/Services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.OppiMac
        PRODUCT_NAME: OppiMac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: AZAQMY4SPZ
    info:
      path: OppiMac/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        LSApplicationCategoryType: "public.app-category.developer-tools"
        SentryDSN: "$(SENTRY_DSN)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true

  PiRemoteActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PiRemoteActivityExtension
        type: group
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.PiRemote.ActivityExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: AZAQMY4SPZ
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: PiRemote
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OppiMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OppiMacTests
        type: group
    dependencies:
      - target: OppiMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.OppiMacTests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"

  PiRemoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PiRemoteTests
        type: group
    dependencies:
      - target: PiRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.PiRemoteTests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"

  PiRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PiRemoteUITests
        type: group
    dependencies:
      - target: PiRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chenda.PiRemoteUITests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  OppiMac:
    build:
      targets:
        OppiMac: all
        OppiMacTests: [test]
    test:
      targets:
        - OppiMacTests

  PiRemote:
    build:
      targets:
        PiRemote: all
        PiRemoteActivityExtension: all
        PiRemoteTests: [test]
    test:
      targets:
        - PiRemoteTests

  PiRemoteUIReliability:
    build:
      targets:
        PiRemote: all
        PiRemoteUITests: [test]
    test:
      targets:
        - PiRemoteUITests
